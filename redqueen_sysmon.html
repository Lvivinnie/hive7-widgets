<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HIVE-7 // System Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050a0f;--panel:#0a0f14;--border:#1a0505;
  --glow:#ff2222;--glow-dim:#8b0000;
  --accent:#ff2222;--accent2:#00ffcc;
  --accent2-dim:#006655;--green:#00cc66;
  --yellow:#ffcc00;--orange:#ff6600;
  --text:#e0e0e0;--text-dim:#555;
  --font-head:'Orbitron','Courier New',monospace;
  --font-mono:'Share Tech Mono','Courier New',monospace;
}
html,body{width:100%;height:100vh;overflow:hidden;background:var(--bg);font-family:var(--font-mono);color:var(--text);user-select:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--glow-dim)}

#app{display:flex;flex-direction:column;height:100vh}

/* Title Bar */
.title-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 12px;
  background:#080808;
  border-bottom:1px solid var(--border);
  box-shadow:0 1px 16px rgba(139,0,0,0.25);
  flex-shrink:0;
  -webkit-app-region:drag;
}
.title-bar .left{display:flex;align-items:center;gap:10px}
.led{width:8px;height:8px;border-radius:50%;background:var(--glow);box-shadow:0 0 8px var(--glow);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 6px var(--glow)}50%{box-shadow:0 0 14px var(--glow)}}
.hive-title{font-family:var(--font-head);font-size:12px;color:var(--glow);letter-spacing:3}
.hive-sub{font-size:8px;color:var(--text-dim);letter-spacing:1}
.title-ver{font-size:7px;color:var(--text-dim);font-family:var(--font-head)}
.title-close{
  -webkit-app-region:no-drag;
  background:rgba(139,0,0,0.5);border:1px solid var(--glow-dim);
  color:var(--glow);font-size:10px;width:18px;height:18px;
  border-radius:50%;cursor:pointer;line-height:18px;text-align:center;
  flex-shrink:0;transition:all 0.2s;
}
.title-close:hover{background:rgba(220,20,20,0.8);box-shadow:0 0 6px var(--glow)}

/* Content */
.content{flex:1;overflow:hidden;position:relative;padding:12px;display:flex;flex-direction:column;gap:8px}

/* Scanlines */
.scanlines{position:absolute;inset:0;pointer-events:none;z-index:20;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 3px)}

/* Hex BG */
.hex-bg{position:absolute;inset:0;pointer-events:none;z-index:0;opacity:0.07}

/* Corner */
.corner-tl,.corner-br{position:absolute;width:12px;height:12px;pointer-events:none;z-index:5}
.corner-tl{top:4px;left:4px;border-top:1px solid var(--glow-dim);border-left:1px solid var(--glow-dim)}
.corner-br{bottom:4px;right:4px;border-bottom:1px solid var(--glow-dim);border-right:1px solid var(--glow-dim)}

/* Gauge Card */
.gauge-row{display:flex;gap:8px}

.gauge-card{
  flex:1;padding:10px;
  border:1px solid var(--border);background:rgba(10,15,20,0.9);
  box-shadow:0 0 8px rgba(139,0,0,0.2);
}
.gcard-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.gcard-label{font-size:8px;color:var(--text-dim);font-family:var(--font-head);letter-spacing:1}
.gcard-icon{font-size:10px}
.gcard-value{font-family:var(--font-head);font-size:20px;font-weight:700;line-height:1;margin-bottom:4px}
.gcard-value.red{color:var(--glow);text-shadow:0 0 8px rgba(255,34,34,0.6)}
.gcard-value.green{color:var(--green);text-shadow:0 0 8px rgba(0,204,102,0.6)}
.gcard-value.yellow{color:var(--yellow);text-shadow:0 0 8px rgba(255,204,0,0.6)}
.gcard-value.cyan{color:var(--accent2);text-shadow:0 0 8px rgba(0,255,204,0.6)}
.gcard-unit{font-size:9px;color:var(--text-dim);margin-bottom:6px}

.gauge-bar{width:100%;height:6px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.gauge-fill{height:100%;border-radius:2px;transition:width 0.5s ease}
.gauge-fill.red{background:linear-gradient(90deg,#8b0000,var(--glow));box-shadow:0 0 6px rgba(255,34,34,0.5)}
.gauge-fill.green{background:linear-gradient(90deg,#003311,var(--green));box-shadow:0 0 6px rgba(0,204,102,0.5)}
.gauge-fill.yellow{background:linear-gradient(90deg,#665500,var(--yellow));box-shadow:0 0 6px rgba(255,204,0,0.5)}
.gauge-fill.cyan{background:linear-gradient(90deg,#006655,var(--accent2));box-shadow:0 0 6px rgba(0,255,204,0.5)}

.gcard-mini{display:flex;justify-content:space-between;margin-top:3px}
.gcard-mini span{font-size:7px;color:var(--text-dim)}

/* Network Card */
.net-card{flex:1;padding:10px;border:1px solid var(--border);background:rgba(10,15,20,0.9);box-shadow:0 0 8px rgba(0,255,204,0.1)}
.net-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.net-label{font-size:8px;color:var(--text-dim);font-family:var(--font-head);letter-spacing:1}
.net-icon{font-size:10px;color:var(--accent2)}

.net-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.net-name{font-size:8px;color:var(--text-dim)}
.net-val{font-family:var(--font-head);font-size:11px;color:var(--accent2)}
.net-bar{width:100%;height:4px;background:rgba(0,255,204,0.05);border:1px solid rgba(0,255,204,0.2);border-radius:2px;overflow:hidden;margin-bottom:6px}
.net-fill{height:100%;background:linear-gradient(90deg,#004433,var(--accent2));border-radius:2px;transition:width 0.5s ease}

/* Process List */
.process-card{flex:1;min-height:0;padding:8px;border:1px solid var(--border);background:rgba(10,15,20,0.9);display:flex;flex-direction:column;overflow:hidden}
.proc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;flex-shrink:0}
.proc-label{font-size:8px;color:var(--text-dim);font-family:var(--font-head);letter-spacing:1}
.proc-count{font-size:8px;color:var(--glow);font-family:var(--font-head)}
.proc-list{flex:1;overflow-y:auto;min-height:0}
.proc-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid rgba(26,5,5,0.5)}
.proc-row:last-child{border-bottom:none}
.proc-name{font-size:8px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:6px}
.proc-cpu{font-family:var(--font-head);font-size:8px;min-width:35px;text-align:right}
.proc-cpu.hi{color:var(--glow)}
.proc-cpu.med{color:var(--yellow)}
.proc-cpu.lo{color:var(--green)}

/* Bottom Status */
.status-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:4px 12px;border-top:1px solid var(--border);background:#060606;flex-shrink:0;
}
.status-left{font-size:7px;color:var(--text-dim);font-family:var(--font-head)}
.status-right{display:flex;align-items:center;gap:4px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 4px var(--green);animation:pulse 2s ease-in-out infinite}
.status-text{font-size:7px;color:var(--green);font-family:var(--font-head)}
</style>
</head>
<body>
<div id="app">
  <div class="title-bar">
    <div class="left">
      <div class="led"></div>
      <div>
        <div class="hive-title">HIVE-7</div>
        <div class="hive-sub">SYSTEM MONITOR // REAL-TIME</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="title-ver" id="sys-time">--:--:--</div>
      <button class="title-close" onclick="window.close()">×</button>
    </div>
  </div>

  <div class="content">
    <div class="scanlines"></div>
    <svg class="hex-bg" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="hexPat2" x="0" y="0" width="52" height="60" patternUnits="userSpaceOnUse">
          <polygon points="26,1 50,15 50,45 26,59 2,45 2,15" fill="none" stroke="#ff2222" stroke-width="0.7"/>
        </pattern>
      </defs>
      <rect width="100%" height="100%" fill="url(#hexPat2)"/>
    </svg>
    <div class="corner-tl"></div>
    <div class="corner-br"></div>

    <!-- Gauge Row -->
    <div class="gauge-row">
      <div class="gauge-card">
        <div class="gcard-header">
          <div class="gcard-label">▸ CPU LOAD</div>
          <div class="gcard-icon">⬡</div>
        </div>
        <div class="gcard-value red" id="cpu-val">--%</div>
        <div class="gcard-unit">INTEL / AMD</div>
        <div class="gauge-bar"><div class="gauge-fill red" id="cpu-bar" style="width:0%"></div></div>
        <div class="gcard-mini"><span>0%</span><span>100%</span></div>
      </div>
      <div class="gauge-card">
        <div class="gcard-header">
          <div class="gcard-label">▸ MEMORY</div>
          <div class="gcard-icon">◈</div>
        </div>
        <div class="gcard-value green" id="mem-val">--%</div>
        <div class="gcard-unit" id="mem-info">-- / -- GB</div>
        <div class="gauge-bar"><div class="gauge-fill green" id="mem-bar" style="width:0%"></div></div>
        <div class="gcard-mini"><span>0%</span><span>100%</span></div>
      </div>
    </div>

    <!-- GPU + Network -->
    <div class="gauge-row">
      <div class="gauge-card">
        <div class="gcard-header">
          <div class="gcard-label">▸ GPU LOAD</div>
          <div class="gcard-icon">▲</div>
        </div>
        <div class="gcard-value cyan" id="gpu-val">--%</div>
        <div class="gcard-unit" id="gpu-info">-- MHz / -- °C</div>
        <div class="gauge-bar"><div class="gauge-fill cyan" id="gpu-bar" style="width:0%"></div></div>
        <div class="gcard-mini"><span>0%</span><span>100%</span></div>
      </div>
      <div class="net-card">
        <div class="net-header">
          <div class="net-label">▸ NETWORK</div>
          <div class="net-icon">⬆⬇</div>
        </div>
        <div class="net-row">
          <div class="net-name">↓ DOWNLOAD</div>
          <div class="net-val" id="net-down">-- KB/s</div>
        </div>
        <div class="net-bar"><div class="net-fill" id="net-bar-down" style="width:0%"></div></div>
        <div class="net-row">
          <div class="net-name">↑ UPLOAD</div>
          <div class="net-val" id="net-up">-- KB/s</div>
        </div>
        <div class="net-bar"><div class="net-fill" id="net-bar-up" style="width:0%"></div></div>
      </div>
    </div>

    <!-- Top Processes -->
    <div class="process-card">
      <div class="proc-header">
        <div class="proc-label">▸ TOP PROCESSES</div>
        <div class="proc-count" id="proc-count">-- PROCS</div>
      </div>
      <div class="proc-list" id="proc-list"></div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-left">HIVE SYSTEM v3.0 // REAL-TIME MONITOR</div>
    <div class="status-right">
      <div class="dot"></div>
      <div class="status-text">MONITORING</div>
    </div>
  </div>
</div>

<script>
let lastNet = {sent:0, recv:0, time:0};

function formatBytes(b) {
  if (b >= 1073741824) return (b/1073741824).toFixed(1)+' GB';
  if (b >= 1048576) return (b/1048576).toFixed(1)+' MB';
  if (b >= 1024) return (b/1024).toFixed(1)+' KB';
  return b+' B';
}

function colorForCpu(pct) {
  if (pct >= 70) return 'hi';
  if (pct >= 30) return 'med';
  return 'lo';
}

async function fetchData() {
  try {
    const r = await fetch('/data');
    const d = await r.json();

    // Time
    document.getElementById('sys-time').textContent = d.time_str;

    // CPU
    const cpu = Math.round(d.cpu);
    document.getElementById('cpu-val').textContent = cpu + '%';
    document.getElementById('cpu-bar').style.width = cpu + '%';

    // Memory
    const mem = Math.round(d.mem.pct);
    document.getElementById('mem-val').textContent = mem + '%';
    document.getElementById('mem-bar').style.width = mem + '%';
    document.getElementById('mem-info').textContent =
      formatBytes(d.mem.used) + ' / ' + formatBytes(d.mem.total);

    // GPU
    const gpu = Math.round(d.gpu.load);
    document.getElementById('gpu-val').textContent = gpu + '%';
    document.getElementById('gpu-bar').style.width = gpu + '%';
    document.getElementById('gpu-info').textContent =
      (d.gpu.clock || '--') + ' MHz / ' + (d.gpu.temp || '--') + ' °C';

    // Network
    const now = Date.now();
    const dt = (now - lastNet.time) / 1000;
    if (dt > 0 && lastNet.time > 0) {
      const ds = Math.max(0, d.net.sent - lastNet.sent) / dt;
      const dr = Math.max(0, d.net.recv - lastNet.recv) / dt;
      document.getElementById('net-down').textContent = formatBytes(ds) + '/s';
      document.getElementById('net-up').textContent = formatBytes(ds) + '/s';
      const maxSpd = 12.5 * 1048576; // 100Mbps baseline
      document.getElementById('net-bar-down').style.width = Math.min(100, dr/maxSpd*100) + '%';
      document.getElementById('net-bar-up').style.width = Math.min(100, ds/maxSpd*100) + '%';
    }
    lastNet = {sent: d.net.sent, recv: d.net.recv, time};

    // Processes
    document.getElementById('proc-count').textContent = d.procs.length + ' PROCS';
    document.getElementById('proc-list').innerHTML = d.procs.slice(0, 12).map(p => {
      const cls = colorForCpu(p.cpu);
      return `<div class="proc-row">
        <div class="proc-name">${p.name}</div>
        <div class="proc-cpu ${cls}">${p.cpu.toFixed(0)}%</div>
      </div>`;
    }).join('');

  } catch(e) {
    console.error(e);
  }
}

// Start polling
setInterval(fetchData, 1500);
fetchData();
</script>
</body>
</html>
